name: CI - Integration, Dependency Check, and UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose up -d --build
          # Wait for all services to become healthy
          echo "Waiting for services to be ready..."
          # You can use a simple loop or wait for healthchecks
          timeout 120 bash -c 'while ! curl -kf https://localhost/; do sleep 2; done'
          # Also wait for DB (healthcheck handles it)
          docker compose ps

      - name: Integration tests (API via HTTPS)
        run: |
          pip install requests
          python tests/integration_test.py

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          # Scan the exact requirements used by the web service
          pip-audit -r web/requirements.txt

      - name: UI tests (Playwright)
        run: |
          # Install Node.js and Playwright (if using Node) or use Python Playwright
          npm init -y
          npm install playwright @playwright/test
          npx playwright install --with-deps chromium
          node tests/ui_test.js

      - name: Stop services
        if: always()
        run: docker compose down