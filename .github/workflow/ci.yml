cat > .github/workflows/ci.yml << 'EOF'
name: CI - Integration, Dependency Check, and UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose up -d --build
          echo "Waiting for services to be ready..."
          timeout 120 bash -c 'while ! curl -kf https://localhost/; do sleep 2; done'
          docker compose ps

      - name: Integration tests (API via HTTPS)
        run: |
          pip install requests
          python tests/integration_test.py

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r web/requirements.txt

      - name: UI tests (Playwright)
        run: |
          npm init -y
          npm install playwright @playwright/test
          npx playwright install --with-deps chromium
          node tests/ui_test.js

      - name: Stop services
        if: always()
        run: docker compose down
EOF